kind = "web"
previewPath = "/"
title = "Error64 OS"
version = "1.0.0"
id = "artifacts/error64"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25265

[services.development]
run = "pnpm --filter @workspace/error64 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/error64", "run", "build" ]
publicDir = "artifacts/error64/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25265"
BASE_PATH = "/"
